<!DOCTYPE html>
<html>
<head>
    <title>Blog Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h1>Blog Home</h1>

<a href="/create" class="btn btn-primary">Create Post</a>

<hr>

{% for p in posts %}

<div class="card p-3 mb-3">

<h2>{{ p[1] }}</h2>
<p>{{ p[2] }}</p>

<a href="/post/{{ p[0] }}" class="btn btn-success btn-sm">Read More</a>

<a href="/edit/{{ p[0] }}" class="btn btn-warning btn-sm">Edit</a>

<a href="/delete/{{ p[0] }}" class="btn btn-danger btn-sm">Delete</a>

</div>

{% endfor %}

</div>

</body>
</html>
